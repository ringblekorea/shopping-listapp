<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --danger: #ef4444;
      --text: #1f2937;
      --muted: #9ca3af;
      --border: #e5e7eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      background: var(--card);
    }

    .input-row input:focus {
      border-color: var(--primary);
    }

    .input-row button {
      padding: 0 18px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .input-row button:hover { background: var(--primary-hover); }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
    }
    .clear-btn:hover { color: var(--danger); }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: var(--primary);
      flex-shrink: 0;
    }

    li .name {
      flex: 1;
      font-size: 1rem;
      word-break: break-word;
    }

    li.done .name {
      text-decoration: line-through;
      color: var(--muted);
    }

    li .delete {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }
    li .delete:hover { color: var(--danger); }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 32px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">필요한 물건을 추가하고 체크하세요</p>

    <form class="input-row" id="form">
      <input id="input" type="text" placeholder="예: 우유, 계란, 빵..." autocomplete="off" />
      <button type="submit">추가</button>
    </form>

    <div class="meta">
      <span id="count">0개 항목</span>
      <button class="clear-btn" id="clearDone">완료 항목 비우기</button>
    </div>

    <ul id="list"></ul>
    <p class="empty" id="empty">아직 항목이 없습니다. 위에서 추가해 보세요!</p>
  </div>

  <script>
    const STORAGE_KEY = "shopping-list-items";

    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const list = document.getElementById("list");
    const empty = document.getElementById("empty");
    const count = document.getElementById("count");
    const clearDone = document.getElementById("clearDone");

    let items = load();

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function render() {
      list.innerHTML = "";

      empty.style.display = items.length === 0 ? "block" : "none";

      const remaining = items.filter((i) => !i.done).length;
      count.textContent = `${items.length}개 항목 · ${remaining}개 남음`;

      items.forEach((item) => {
        const li = document.createElement("li");
        if (item.done) li.classList.add("done");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = item.done;
        checkbox.addEventListener("change", () => toggle(item.id));

        const name = document.createElement("span");
        name.className = "name";
        name.textContent = item.text;

        const del = document.createElement("button");
        del.className = "delete";
        del.textContent = "✕";
        del.title = "삭제";
        del.addEventListener("click", () => remove(item.id));

        li.append(checkbox, name, del);
        list.appendChild(li);
      });
    }

    function addItem(text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      items.push({ id: Date.now() + Math.random(), text: trimmed, done: false });
      save();
      render();
    }

    function toggle(id) {
      const item = items.find((i) => i.id === id);
      if (item) item.done = !item.done;
      save();
      render();
    }

    function remove(id) {
      items = items.filter((i) => i.id !== id);
      save();
      render();
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      addItem(input.value);
      input.value = "";
      input.focus();
    });

    clearDone.addEventListener("click", () => {
      items = items.filter((i) => !i.done);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
